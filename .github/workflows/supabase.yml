name: Supabase Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'supabase/**'
  workflow_dispatch:

concurrency:
  group: supabase-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Migrations → Functions → Types
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: 2.20.5

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Apply migrations
        run: supabase db push -p "$SUPABASE_DB_PASSWORD"
        env:
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Deploy edge functions
        run: |
          set -euo pipefail
          for dir in supabase/functions/*/; do
            fn=$(basename "$dir")
            [[ "$fn" == _* ]] && continue
            echo "→ Deploying $fn..."
            supabase functions deploy "$fn" --project-ref "$SUPABASE_PROJECT_ID"
          done

      - name: Generate TypeScript types
        run: |
          supabase gen types typescript \
            --project-id "$SUPABASE_PROJECT_ID" \
            > src/integrations/supabase/types.ts

      - name: Commit updated types
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/integrations/supabase/types.ts
          if ! git diff --cached --quiet; then
            git commit -m "chore: update supabase types [skip ci]"
            git pull --rebase origin main
            git push
          fi
