services:
  app:
    build: .
    container_name: orientador-app
    ports:
      - "8080:8080"
    volumes:
      - .:/app
      - app_node_modules:/app/node_modules
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true

volumes:
  app_node_modules:
